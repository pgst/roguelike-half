name: Deploy Vue App

on:
  push:
    branches:
      - main # デプロイのトリガーにするブランチ（masterの場合は変更してください）

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. コードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. Node.js環境のセットアップ
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      # 3. 依存関係のインストールとビルド
      - name: Install dependencies
        run: npm ci

      - name: Build Vue App
        run: npm run build # ViteやVue CLIで設定されたビルドコマンド

      # 4. シンフリーサーバーへのSFTPデプロイ
      - name: Deploy via SFTP
        uses: milanmk/actions-file-deployer@master
        with:
          remote-protocol: "sftp"
          remote-host: ${{ secrets.SFTP_HOST }}
          remote-port: 10022 # シンフリーサーバー専用のSSHポート
          remote-user: ${{ secrets.SFTP_USERNAME }}
          ssh-private-key: ${{ secrets.SFTP_PRIVATE_KEY }}
          local-path: './dist' # Vueのビルド成果物が入るディレクトリ
          sync: 'full'
          # リモート（サーバー側）のパス。初期ドメインの場合は以下のような構成になります
          remote-path: '/home/${{ secrets.SFTP_USERNAME }}/pgst.cloudfree.jp/public_html'